.card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:16px;transition:all 0.15s}

.card .meta{font-size:0.75rem;color:var(--text3)}
.card .heat{display:inline-block;background:var(--accent);color:#fff;font-size:0.65rem;padding:2px 8px;border-radius:10px;margin-left:6px;opacity:0.7}
.gh-card{padding:18px}
.gh-card h3{font-size:0.95rem}
.gh-card h3 a{color:var(--accent)}
.gh-card .desc{font-size:0.8rem;color:var(--text2);line-height:1.5;margin:6px 0}
.gh-card .lang{display:inline-block;font-size:0.7rem;color:var(--text3);margin-right:12px}
.gh-card .lang::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;background:var(--accent)}
.intl-card{border-left:3px solid var(--accent)}
.intl-card .region{font-size:0.7rem;padding:2px 6px;border-radius:4px;margin-right:6px;display:inline-block}

.region-EastAsia{background:#dbeafe;color:#1d4ed8}
.region-Americas{background:#ede9fe;color:#6d28d9}

.region-Europe{background:#e0e7ff;color:#3730a3}
.region-Africa{background:#dcfce7;color:#166534}
.region-Global{background:#f3f4f6;color:#374151}
.footer{text-align:center;padding:32px;color:var(--text3);font-size:0.75rem;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}.container{padding:16px}}
</style>

function buildGh() {
  var g = document.getElementById('gh-grid'), h = '';
  ghData.forEach(function(r) {
    h += '<div class="card gh-card"><h3><a href="' + r.url + '" target="_blank">' + r.owner + ' / ' + r.name + '</a></h3><p class="desc">' + r.description + '</p><span class="lang">' + (r.language || 'Other') + '</span>⭐ ' + r.stars + ' <span style="color:var(--accent);font-size:0.75rem">+' + r.starsToday + ' today</span></div>';
  });
  g.innerHTML = h;
}

function buildOfficial() {
  var g = document.getElementById('official-grid'), h = '';
  officialData.forEach(function(r) {
    h += '<div class="card"><span class="rank" style="color:var(--text3)">' + r.source + '</span><h3><a href="' + r.url + '" target="_blank">' + r.title + '</a></h3></div>';
  });
  g.innerHTML = h;
}

function buildIntl() {
  var g = document.getElementById('intl-grid'), h = '';
  intlData.forEach(function(r) {
    h += '<div class="card intl-card"><span class="region region-' + r.regionClass + '">' + r.region + '</span><h3><a href="' + r.url + '" target="_blank">' + r.title + '</a></h3><p class="meta">' + r.source + '</p></div>';
  });
  g.innerHTML = h;
}

function buildHot() {
  var g = document.getElementById('hot-grid'), h = '';
  hotData.forEach(function(r) {
    h += '<div class="card"><span class="rank">#' + r.rank + '</span><h3><a href="' + r.url + '" target="_blank">' + r.title + '</a></h3><span class="heat">' + r.heat + '</span></div>';
  });
  g.innerHTML = h;
}

buildGh(); buildOfficial(); buildIntl(); buildHot();
