function fmtRaw(n) {
  return n.toLocaleString('zh-CN');
}

const maxHeat = Math.max(...newsData.map(n => n.heat));

function buildNews() {
  const grid = document.getElementById('news-grid');
  grid.innerHTML = newsData.map(n => {
    const pct = Math.round((n.heat / maxHeat) * 100);
    return `<article class="news-card">
      <div class="news-card-top">
        <span class="news-rank">No.<span class="news-rank-num">${String(n.rank).padStart(2,'0')}</span></span>
        <span class="news-category cat-${n.category}">${n.category}</span>
      </div>
      <h3 class="news-title"><a href="${n.url}" target="_blank" class="news-link">${n.title}</a></h3>
      <p class="news-summary">${n.summary}</p>
      <div class="news-bottom">
        <span class="news-source">${n.source}</span>
        <div class="news-heat">
          <div class="heat-bar-wrap"><div class="heat-bar-fill" style="width:${pct}%"></div></div>
          <span class="heat-value">${fmtRaw(n.heat)}</span>
        </div>
      </div>
    </article>`;
  }).join('');
}

function buildGh() {
  const grid = document.getElementById('gh-grid');
  grid.innerHTML = ghData.map(p => {
    return `<article class="gh-card">
      <div class="gh-card-top">
        <span class="gh-rank">No.${String(p.rank).padStart(2,'0')}</span>
        <div class="gh-stats">
          <span class="gh-stars-total">⭐ ${p.stars}</span>
          <span class="gh-stars-today">+${p.starsToday}</span>
        </div>
      </div>
      <div class="gh-repo">
        <a class="gh-repo-link" href="https://github.com/${p.owner}/${p.name}" target="_blank" rel="noopener">

      </div>
      <span class="gh-lang lang-${p.language}"><span class="lang-dot"></span>${p.language}</span>
      <p class="gh-desc">${p.description}</p>
      <p class="gh-detail">${p.detail}</p>
    </article>`;
  }).join('');
}
