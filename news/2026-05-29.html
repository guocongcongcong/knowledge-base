*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC',sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#2d2d44 100%);color:#fff;padding:48px 32px 40px;text-align:center}

.section-title{font-size:1.1rem;font-weight:600;margin:40px 0 16px;color:var(--text);display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:4px;height:20px;background:var(--accent);border-radius:2px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:16px;transition:all 0.15s}

.card .rank{font-size:0.75rem;color:var(--accent);font-weight:600;margin-bottom:4px}
.card h3{font-size:0.9rem;font-weight:500;line-height:1.5;margin-bottom:6px}
.card h3 a{color:var(--text);text-decoration:none}
.card h3 a:hover{color:var(--accent);text-decoration:underline}
.card .meta{font-size:0.75rem;color:var(--text3)}
.card .heat{display:inline-block;background:var(--accent);color:#fff;font-size:0.65rem;padding:2px 8px;border-radius:10px;margin-left:6px;opacity:0.7}
.gh-card{padding:18px}
.gh-card h3{font-size:0.95rem}
.gh-card h3 a{color:var(--accent)}
.gh-card .desc{font-size:0.8rem;color:var(--text2);line-height:1.5;margin:6px 0}
.gh-card .lang{display:inline-block;font-size:0.7rem;color:var(--text3);margin-right:12px}
.gh-card .lang::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;background:var(--accent)}
.intl-card{border-left:3px solid var(--accent)}
.intl-card .region{font-size:0.7rem;padding:2px 6px;border-radius:4px;margin-right:6px;display:inline-block}
.region-中东{background:#fef3c7;color:#b45309}
.region-东亚{background:#dbeafe;color:#1d4ed8}
.region-美洲{background:#ede9fe;color:#6d28d9}
.region-俄乌{background:#fee2e2;color:#b91c1c}
.region-南亚{background:#ffedd5;color:#c2410c}
.region-欧洲{background:#e0e7ff;color:#3730a3}
.footer{text-align:center;padding:32px;color:var(--text3);font-size:0.75rem;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}.container{padding:16px}}
</style>
