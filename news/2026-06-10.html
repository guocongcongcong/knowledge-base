function buildGh() {
  var g = document.getElementById('gh-grid'), h = '';
  ghData.forEach(function(r) {
    h += '<div class="card gh-card"><h3><a href="' + r.url + '" target="_blank">' + r.owner + ' / ' + r.name + '</a></h3><p class="desc">' + r.description + '</p><span class="lang">' + r.language + '</span>⭐ ' + r.stars + ' <span style="color:var(--accent);font-size:0.75rem">+' + r.starsToday + ' today</span></div>';
  });
  g.innerHTML = h;
}

function buildOfficial() {
  var g = document.getElementById('official-grid'), h = '';
  officialData.forEach(function(r) {
    h += '<div class="card"><span class="rank" style="color:var(--text3)">' + r.source + '</span><h3><a href="' + r.url + '" target="_blank">' + r.title + '</a></h3></div>';
  });
  g.innerHTML = h;
}

function buildIntl() {
  var g = document.getElementById('intl-grid'), h = '';
  intlData.forEach(function(r) {

  });
  g.innerHTML = h;
}

function buildHot() {
  var g = document.getElementById('hot-grid'), h = '';

  });
  g.innerHTML = h;
}
