html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {

  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

.header {

  padding: 56px 24px 48px;

}
.header::before {

  right: -20%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(26,111,245,0.08) 0%, transparent 70%);

  pointer-events: none;

.header-inner { max-width: var(--max-w); margin: 0 auto; }
.header-date {

}
.header-sub {

}

.main { max-width: var(--max-w); margin: 0 auto; padding: 40px 24px 60px; }

.section { margin-bottom: 52px; }
.section-header {

  gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.section-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.01em;
  color: var(--text-primary);
}
.section-count {
  font-size: 13px;
  color: var(--text-tertiary);
  font-weight: 500;
}

/* News Grid */
.news-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.news-card {

  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  cursor: default;
  position: relative;
  overflow: hidden;
}
.news-card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.news-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.news-rank {
  font-family: var(--font-mono);

  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.news-rank-num { font-size: 16px; color: var(--text-secondary); font-weight: 700; }
.news-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
.news-category {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--radius-sm);

.cat-时政 { background: #e8f1fe; color: #2563eb; }

.cat-国际 { background: #f3edff; color: #7c3aed; }

.cat-教育 { background: #e3f5f7; color: #0891b2; }
.cat-文化 { background: #eeedfc; color: #4f46e5; }

.news-link {

.news-link:hover {

}
.news-title {

  font-weight: 600;

}
.news-summary {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.55;
}
.news-bottom {

  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 6px;
}
.news-source {
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.03em;
}
.news-heat {

  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.heat-bar-wrap {

  background: #eee;
  border-radius: 2px;

}

function fmtRaw(n) {
  return n.toLocaleString('zh-CN');
}

const maxHeat = Math.max(...newsData.map(n => n.heat));

function buildNews() {
  const grid = document.getElementById('news-grid');
  grid.innerHTML = newsData.map(n => {
    const pct = Math.round((n.heat / maxHeat) * 100);
    return `<article class="news-card">
      <div class="news-card-top">
        <span class="news-rank">No.<span class="news-rank-num">${String(n.rank).padStart(2,'0')}</span></span>
        <span class="news-category cat-${n.category}">${n.category}</span>
      </div>
      <h3 class="news-title"><a href="${n.url}" target="_blank" class="news-link">${n.title}</a></h3>
      <p class="news-summary">${n.summary}</p>
      <div class="news-bottom">
        <span class="news-source">${n.source}</span>
        <div class="news-heat">
          <div class="heat-bar-wrap"><div class="heat-bar-fill" style="width:${pct}%"></div></div>
          <span class="heat-value">${fmtRaw(n.heat)}</span>
        </div>
      </div>
    </article>`;
  }).join('');
}

function buildGh() {
  const grid = document.getElementById('gh-grid');
  grid.innerHTML = ghData.map(p => {
    return `<article class="gh-card">
      <div class="gh-card-top">
        <span class="gh-rank">No.${String(p.rank).padStart(2,'0')}</span>
        <div class="gh-stats">
          <span class="gh-stars-total">⭐ ${p.stars}</span>
          <span class="gh-stars-today">+${p.starsToday}</span>
        </div>
      </div>
      <div class="gh-repo">
        <a class="gh-repo-link" href="https://github.com/${p.owner}/${p.name}" target="_blank" rel="noopener">
          <span class="gh-repo-owner">${p.owner}</span><span class="gh-repo-name"> / ${p.name}</span>
        </a>
      </div>
      <span class="gh-lang lang-${p.language}"><span class="lang-dot"></span>${p.language}</span>
      <p class="gh-desc">${p.description}</p>
      <p class="gh-detail">${p.detail}</p>
    </article>`;
  }).join('');
}
