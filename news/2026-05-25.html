<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日新闻 — 2026年5月25日 星期一</title>
<style>
:root {
  --bg: #f9f9f8;
  --card-bg: #ffffff;
  --text-primary: #111110;
  --text-secondary: #6b6b67;
  --text-tertiary: #9c9c97;
  --border: #e8e8e4;
  --border-hover: #d4d4d0;
  --accent: #1a6ff5;
  --accent-light: #e8f1fe;
  --header-bg: #111110;
  --header-text: #ffffff;
  --max-w: 960px;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --transition: 160ms ease;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', ui-monospace, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

.header {
  background: linear-gradient(160deg, #111110 0%, #1a1a2e 50%, #111827 100%);
  color: var(--header-text);
  padding: 56px 24px 48px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -60%;
  right: -20%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(26,111,245,0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.header-inner { max-width: var(--max-w); margin: 0 auto; }
.header-date {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.02em;
  line-height: 1.3;
  margin-bottom: 6px;
}
.header-sub {
  font-size: 15px;
  color: rgba(255,255,255,0.55);
  font-weight: 400;
  letter-spacing: 0.03em;
}

.main { max-width: var(--max-w); margin: 0 auto; padding: 40px 24px 60px; }

.section { margin-bottom: 52px; }
.section-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.section-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.01em;
  color: var(--text-primary);
}
.section-count {
  font-size: 13px;
  color: var(--text-tertiary);
  font-weight: 500;
}

/* News Grid */
.news-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.news-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  cursor: default;
  position: relative;
  overflow: hidden;
}
.news-card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.news-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.news-rank {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.news-rank-num { font-size: 16px; color: var(--text-secondary); font-weight: 700; }
.news-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
.news-category {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.cat-时政 { background: #e8f1fe; color: #2563eb; }
.cat-科技 { background: #e3f5eb; color: #16a34a; }
.cat-社会 { background: #fff3e8; color: #ea580c; }
.cat-国际 { background: #f3edff; color: #7c3aed; }
.cat-经济 { background: #fef9e7; color: #b8860b; }
.cat-娱乐 { background: #fde8f1; color: #db2777; }
.cat-军事 { background: #fde8e8; color: #dc2626; }
.cat-教育 { background: #e3f5f7; color: #0891b2; }
.cat-文化 { background: #eeedfc; color: #4f46e5; }

.news-link {
  color: inherit;
  text-decoration: none;
  transition: color var(--transition);
}
.news-link:hover {
  color: var(--accent);
  text-decoration: underline;
}
.news-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.45;
  color: var(--text-primary);
  letter-spacing: 0.01em;
}
.news-summary {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.55;
}
.news-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 6px;
}
.news-source {
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.03em;
}
.news-heat {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.heat-bar-wrap {
  width: 64px;
  height: 4px;
  background: #eee;
  border-radius: 2px;
  overflow: hidden;
}
.heat-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, #1a6ff5 0%, #6366f1 60%, #dc2626 100%);
  transition: width 600ms ease;
}
.news-card:hover .heat-bar-fill { filter: brightness(1.1); }
.heat-value {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 500;
  min-width: 60px;
  text-align: right;
}

/* GitHub Grid */
.gh-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.gh-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  cursor: default;
}
.gh-card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.gh-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.gh-rank {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-tertiary);
}
.gh-stats {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
}
.gh-stars-total { color: var(--text-secondary); font-weight: 600; }
.gh-stars-today { color: #16a34a; font-weight: 600; }
.gh-repo {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  word-break: break-all;
}
.gh-repo-owner { color: var(--text-tertiary); font-weight: 500; }
.gh-repo-name { color: var(--text-primary); }
.gh-repo-link { color: var(--accent); text-decoration: none; word-break: break-all; }
.gh-repo-link:hover { text-decoration: underline; }
.gh-lang {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.lang-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
.lang-TypeScript .lang-dot { background: #3178c6; }
.lang-TypeScript { color: #3178c6; }
.lang-Python .lang-dot { background: #16a34a; }
.lang-Python { color: #16a34a; }
.lang-Rust .lang-dot { background: #ea580c; }
.lang-Rust { color: #ea580c; }
.lang-Shell .lang-dot { background: #6b7280; }
.lang-Shell { color: #6b7280; }
.lang-Markdown .lang-dot { background: #7c3aed; }
.lang-Markdown { color: #7c3aed; }
.lang-C\# .lang-dot { background: #7b3fe4; }
.lang-C\# { color: #7b3fe4; }
.lang-N\/A .lang-dot { background: #9b9b9b; }
.lang-N\/A { color: #9b9b9b; }
.gh-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.gh-detail {
  font-size: 12.5px;
  color: var(--text-tertiary);
  line-height: 1.55;
  padding-top: 4px;
  border-top: 1px solid var(--border);
}

/* Official Media */
.official-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.official-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.official-card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow-sm);
}
.official-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.official-source {
  font-size: 11px;
  font-weight: 700;
  color: #dc2626;
  letter-spacing: 0.04em;
}
.official-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.45;
  color: var(--text-primary);
}
.official-summary {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.footer {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 32px 24px 48px;
  text-align: center;
  border-top: 1px solid var(--border);
}
.footer-text {
  font-size: 12px;
  color: var(--text-tertiary);
  line-height: 1.7;
}
.footer-dot { margin: 0 8px; color: var(--border); }


/* International News */
.intl-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.intl-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.intl-card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow-sm);
}
.intl-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.intl-region {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
}
.region-中东 { background: #fef3c7; color: #d97706; }
.region-欧洲 { background: #e8f1fe; color: #2563eb; }
.region-美洲 { background: #f3edff; color: #7c3aed; }
.region-俄乌 { background: #fde8e8; color: #dc2626; }
.region-卫生 { background: #e3f5eb; color: #16a34a; }
.region-南亚 { background: #fff3e8; color: #ea580c; }
.region-东亚 { background: #e3f5f7; color: #0891b2; }
.intl-source {
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.03em;
}
.intl-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.45;
  color: var(--text-primary);
}
.intl-summary {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
}

@media (max-width: 768px) {
  .header { padding: 44px 20px 36px; }
  .header-date { font-size: 24px; }
  .header-sub { font-size: 14px; }
  .main { padding: 28px 16px 40px; }
  .news-grid,
  .gh-grid,
  .official-grid { grid-template-columns: 1fr; gap: 8px; }
  .section { margin-bottom: 36px; }
  .section-title { font-size: 18px; }
  .news-card { padding: 16px 18px; }
  .gh-card { padding: 16px 18px; }
  .heat-bar-wrap { width: 48px; }
  .heat-value { font-size: 10px; }
}
@media (max-width: 375px) {
  .header { padding: 36px 16px 28px; }
  .header-date { font-size: 21px; }
}
</style>
</head>

function buildIntl() {
  const grid = document.getElementById('intl-grid');
  grid.innerHTML = intlData.map(n => {
    return `<article class="intl-card">
      <div class="intl-top">
        <span class="intl-region region-${n.region}">${n.region}</span>
        <span class="intl-source">${n.source}</span>
      </div>
      <h3 class="intl-title"><a href="${n.url}" target="_blank" class="news-link">${n.title}</a></h3>

const maxHeat = Math.max(...newsData.map(n => n.heat));

function buildNews() {
  const grid = document.getElementById('news-grid');
  grid.innerHTML = newsData.map(n => {
    const pct = Math.round((n.heat / maxHeat) * 100);
    return `<article class="news-card">
      <div class="news-card-top">
        <span class="news-rank">No.<span class="news-rank-num">${String(n.rank).padStart(2,'0')}</span></span>
        <span class="news-category cat-${n.category}">${n.category}</span>
      </div>
      <h3 class="news-title"><a href="${n.url}" target="_blank" class="news-link">${n.title}</a></h3>
      <p class="news-summary">${n.summary}</p>
      <div class="news-bottom">
        <span class="news-source">${n.source}</span>
        <div class="news-heat">
          <div class="heat-bar-wrap"><div class="heat-bar-fill" style="width:${pct}%"></div></div>
          <span class="heat-value">${fmtRaw(n.heat)}</span>
        </div>
      </div>
    </article>`;
  }).join('');
}

function buildGh() {
